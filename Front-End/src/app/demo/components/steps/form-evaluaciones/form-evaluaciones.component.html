<div class="flex flex-row flex-wrap">
    <div class="flex align-items-center justify-content-center font-bold border-round m-2">
        <p-button (click)="enviarConstancia()" [disabled]="c3p" styleClass="iecm-button-primary-evaluaciones"
            label="Constancia de participación">
        </p-button>
    </div>
</div>

<div class="card flex justify-center mt-4">
    <p-accordion [activeIndex]="activeIndex" (onOpen)="onTabOpen($event)" class="w-full">

        <!-- Tab evaluacion diagnostica -->
        <p-accordionTab [disabled]="c0p">
            <ng-template pTemplate="header">
                <div class="flex justify-content-between align-items-center w-full">

                    <span>Evaluación inicial diagnostica</span>

                    <!-- SOLO cuando está cerrado -->
                    <span *ngIf="activeIndex !== 0" class="font-bold">
                        Calificación: {{ calificacion1Tab }}
                    </span>

                </div>
            </ng-template>
            <div class="flex flex-column">
                <fieldset *ngFor="let pregunta of preguntasGenerales">
                    <legend>{{pregunta.pregunta}}</legend>

                    <div *ngFor="let r of obtenerRespuestasPorPregunta(pregunta.id)">

                        <ng-container>
                            <label>
                                <input (change)="onCheckboxChange($event, 'p' + pregunta.id, pregunta, r)" type="radio"
                                    [name]="'pregunta_' + pregunta.id" [value]="r.id"
                                    [(ngModel)]="respuestasSeleccionadas[pregunta.id]" />
                                {{ r.respuesta }}
                            </label>
                        </ng-container>

                        <div *ngIf="esOtro(r.respuesta) && respuestasSeleccionadas[pregunta.id] === r.id">
                            <input type="text" maxlength="50" placeholder="Especifica..."
                                [(ngModel)]="textoOtro[pregunta.id]" />
                        </div>
                    </div>
                </fieldset>


                <fieldset *ngFor="let pregunta of preguntasInicial">
                    <legend>{{pregunta.pregunta}}</legend>
                    <div *ngFor="let r of obtenerRepuestasInicial(pregunta.id)">
                        <ng-container>
                            <label>
                                <input (change)="onCheckboxChange($event, 'p' + pregunta.id, pregunta, r)" type="radio"
                                    [name]="'pregunta_' + pregunta.id" [value]="r.id"
                                    [(ngModel)]="respuestasSeleccionadas[pregunta.id]" />
                                {{ r.respuesta }}
                            </label>
                        </ng-container>

                        <div *ngIf="esOtro(r.respuesta) && respuestasSeleccionadas[pregunta.id] === r.id">
                            <input type="text" maxlength="50" placeholder="Especifica..."
                                [(ngModel)]="textoOtro[pregunta.id]" />
                        </div>
                    </div>
                </fieldset>


                <div class="flex align-items-center justify-content-center h-4rem font-bold border-round m-2">
                    <p-button type="submit" (click)="sendEvaluacion(1)" [disabled]="disabledButtonEvaluacionInicial"
                        styleClass="iecm-button-primary-evaluaciones" label="Finalizar Evaluación">
                    </p-button>
                </div>
            </div>
        </p-accordionTab>
        <!-- Final Tab Evaluación Diagnostica -->

        <!-- Tab evaluacion final -->
        <p-accordionTab [disabled]="c1p">
            <ng-template pTemplate="header">

                    <span>Evaluación final diagnostica</span>

                        </div>
                    </div>
                </fieldset>

                    </p-button>
                </div>
            </div>
        </p-accordionTab>

                        <textarea [name]="'texto_' + pregunta.id" maxlength="50"

                    </div>

                <div class="flex align-items-center justify-content-center h-4rem font-bold border-round m-2">
                    <p-button (click)="sendSatisfaccion(3)" [disabled]="disabledButtonEncuestaSatisfaccion"
