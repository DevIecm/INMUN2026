<div class="flex flex-row flex-wrap">
    <div class="flex align-items-center justify-content-center font-bold border-round m-2">
        <p-button 
            (click)="enviarConstancia()"
            [disabled]="c3p"
            styleClass="iecm-button-primary-evaluaciones" 
            label="Constancia de participación">
        </p-button>
    </div>
</div>

 <div class="card flex justify-center mt-4">
    <p-accordion class="w-full" value="0">
        <p-accordionTab header="Evaluación inicial diagnostica" value="0">
            <div class="flex flex-column">
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">1</div>
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">2</div>
                <div class="flex align-items-center justify-content-center h-4rem font-bold border-round m-2">
                    <p-button 
                        (click)="sendEvaluacionInicial()"
                        [disabled]="disabledButtonEvaluacionInicial"
                        styleClass="iecm-button-primary-evaluaciones" 
                        label="Enviar Evaluación Inicial">
                    </p-button>
                </div>
            </div>
        </p-accordionTab>
        <p-accordionTab [disabled]="c1p" header="Evaluación final diagnostica" value="1">
            <div class="flex flex-column">
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">1</div>
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">2</div>
                <div class="flex align-items-center justify-content-center h-4rem font-bold border-round m-2">
                    <p-button 
                        (click)="sendEvaluacionFinal()"
                        [disabled]="disabledButtonEvaluacionFinal"
                        styleClass="iecm-button-primary-evaluaciones" 
                        label="Enviar Evaluación Final">
                    </p-button>
                </div>
            </div> 
        </p-accordionTab>
        <p-accordionTab [disabled]="c2p" header="Encuesta de satisfacción" value="2">
            <div class="flex flex-column">
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">1</div>
                <div class="flex align-items-center justify-content-center h-4rem bg-primary font-bold border-round m-2">2</div>
                <div class="flex align-items-center justify-content-center h-4rem font-bold border-round m-2">
                    <p-button 
                        (click)="sendEncuestaSatisfaccion()"
                        [disabled]="disabledButtonEncuestaSatisfaccion"
                        styleClass="iecm-button-primary-evaluaciones" 
                        label="Enviar Encuesta de Satisfacción">
                    </p-button>
                </div>
            </div>
        </p-accordionTab>
    </p-accordion>
</div>
