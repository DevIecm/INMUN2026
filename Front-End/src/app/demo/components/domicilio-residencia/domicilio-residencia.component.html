<div class="grid">

    <div class="col-12">
        <app-titulo [titulo]="'Domicilio y Tiempo de Residencia'"></app-titulo>
    </div>

    <div class="col-12">

        <div class="card p-fluid">
            <div class="grid">

                <div class="col-12">
                    <span>
                        En este apartado debes llenar la información relacionada
                        con tu calle, número exterior e interior, código postal,
                        colonia, Demarcación Territorial, y el tiempo que tienes
                        de residencia en tu domicilio.
                    </span>
                </div>
        
                <div class="col-12">
                    <span [ngStyle]="{color:'var(--red-500)'}">Todos los campos con * son obligatorios</span>
                </div>

                <div class="col-12">
                    <app-formulario></app-formulario>
                </div>
        
                




            </div>
        </div>

        
    </div>

</div>
