<div class="grid mr-1 ml-1">
    <div class="flex flex-wrap align-items-center justify-content-center sm:col-12 md:col-6 lg:col-6 bg-iecm">
        <!-- Fondo Purple con logo IECM -->
        <!-- <p>Lorem ipsum dolor sit.</p> -->
        <img src="assets/layout/images/iecm/logo-whitetxt.png" class="img-iecm-login">

    </div>

    <div class="sm:col-12 md:col-6 lg:col-6">
        <!-- Login -->

        <div
            style="border-radius:56px; padding:0.3rem; background: linear-gradient(180deg, var(--primary-color) 10%, rgba(140, 101, 170, 0) 30%);">
            <div class="w-full surface-card py-8 px-5 sm:px-8" style="border-radius:53px">
                <a class="grid layout-topbar-logo ml-4 justify-content-center">
                    <img src="assets/images/inmun.jpg" alt="logo del INMUN" style="height: 8.5rem !important;">
                </a>
                <div class="text-center mb-5">
                    <div class="text-900 text-3xl font-medium mb-3">Sistema de registro INMUN 2026</div>
                    <h2 style="color: var(--primary-color)">
                        <i>
                            Recuperar contraseña
                        </i>
                    </h2>
                </div>

                <!-- <p>Escribe el correo electrónico que hayas registrado. Si existe una cuenta asociada con ese correo, se enviará la información para recuperar la contraseña</p> -->

                <!-- {{ formLogin.value | json }}
                {{ formLogin.valid }} -->

                <form [formGroup]="formCambiarContrasena" (submit)="recuperarContrasena();">
                    <div>
                        <label for="user1" class="block text-900 text-xl font-medium mb-2">Correo Electrónico</label>
                        <input id="user1" type="text" formControlName="correo_electronico" pInputText class="w-full"
                            style="padding:1rem" [disabled]="true" [readOnly]="true">

                        <label for="password1" class="block text-900 font-medium text-xl mb-2">Nueva contraseña</label>
                        <p-password formControlName="contrasena" [toggleMask]="true" styleClass="w-full mb-5"
                            inputStyleClass="w-full p-3 md:w-30m" [feedback]="false"></p-password>

                        <label for="password1" class="block text-900 font-medium text-xl mb-2">Repetir
                            contraseña</label>
                        <p-password formControlName="repetir_contrasena" [toggleMask]="true" styleClass="w-full mb-5"
                            inputStyleClass="w-full p-3 md:w-30m" [feedback]="false"></p-password>

                        <button [disabled]="!formCambiarContrasena.valid" pButton pRipple type="submit"
                            label="Cambiar contraseña" class="w-full pt-2 p-3 text-xl iecm-button-primary"></button>


                    </div>
                </form>
            </div>
        </div>

        <!-- {{ formCambiarContrasena.value | json }} -->

        <button pButton pRipple label="Regresar" class="w-full mt-3 p-3 text-xl p-button-warning"
            [routerLink]="['/auth/']"></button>

    </div>

</div>


<div class="layout-footer text-center pb-2">
    <span class="font-medium ml-2">Instituto Electoral de la Ciudad de México &bull; Huizaches 25 &bull; Rancho Los
        Colorines &bull; Tlalpan &bull; C.P. 14386 &bull; Ciudad de México &bull; Conmutador: (55) 5483 3800
        {{version}}</span>
</div>
