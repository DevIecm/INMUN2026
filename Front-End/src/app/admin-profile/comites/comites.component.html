<p-toast></p-toast>

<div class="card">
    <p-toolbar styleClass="mb-4 gap-2">
        <ng-template pTemplate="left">
        </ng-template>
        
        <ng-template pTemplate="right">
            <button pButton pRipple label="Registrar comité" routerLink="./registrar" icon="pi pi-plus" class="p-button-success mr-2"></button>
        </ng-template>
    </p-toolbar>
<!-- [tableStyle]="{'min-width': '70rem'}" -->
    <p-table #dt [value]="comites" [rows]="10" [paginator]="true" [globalFilterFields]="['cupo', 'lugares_disponibles','nombre_comite','estado']"
        [rowHover]="true" dataKey="id_comite"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} entradas" [showCurrentPageReport]="true">
        <ng-template pTemplate="caption">
            <div class="flex align-items-center justify-content-between">
                <h5 class="m-0">Comités registrados</h5>
                <span class="p-input-icon-left">
                    <i class="pi pi-search"></i>
                    <input pInputText #textInput type="text" (input)="dt.filterGlobal(textInput.value, 'contains')" placeholder="Buscar..." />
                </span>
            </div>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <!-- <th style="width: 4rem">
                    <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
                </th> -->
                <th pSortableColumn="cupo">Cupo<p-sortIcon field="cupo"></p-sortIcon></th>
                <th pSortableColumn="lugares_disponibles">Lugares disponibles<p-sortIcon field="lugares_disponibles"></p-sortIcon></th>
                <th pSortableColumn="nombre_comite">Nombre <p-sortIcon field="nombre_comite"></p-sortIcon></th>
                <th pSortableColumn="estado" style="min-width:10rem">Status <p-sortIcon field="inventoryStatus"></p-sortIcon></th>
                <th >Acción</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-comite>
            <tr [ngClass]="{'eliminado': comite.estado === 2}">
                <td>{{comite.cupo}}</td>
                <td>{{comite.lugares_disponibles}}</td>
                <td>{{comite.nombre_comite}}</td>
                <td>
                    <!-- {{ comite | json }} -->
                    <!-- {{ estadosComite[comite.estado] }} -->
                    <!-- <p-button [label]="estadosComite[comite.estado]" badge="8" styleClass="mr-2"></p-button> -->
                    <p-badge [value]="estadosComite[comite.estado]" [severity]="severity[comite.estado]"></p-badge>
                </td>
                <td>
                    <button [disabled]="comite.estado === 1 || comite.estado === 2" pTooltip="Publicar comité {{comite.nombre_comite}}" tooltipPosition="top" pButton pRipple icon="pi pi-send" class="p-button-rounded p-button-success mr-2" (click)="publicarComite(comite.id_comite)"></button>
                    <button [disabled]="comite.estado === 1 || comite.estado === 2" pTooltip="Editar el comite {{comite.nombre_comite}}" tooltipPosition="top" pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-secondary mr-2" [routerLink]="['./editar', comite.id_comite]"></button>
                    <button *ngIf="comite.estado === 0; else mostrarMsgNoPuedeeliminar;" pTooltip="Eliminar el comite {{comite.nombre_comite}}" tooltipPosition="top" pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-warning" (click)="deleteProduct(comite.id_comite)"></button>
                    <ng-template #mostrarMsgNoPuedeeliminar>
                        <button type="button" [disabled]="true" pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-warning"></button>
                    </ng-template>
                    
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="summary">
            <div class="flex align-items-center justify-content-between">
                En total hay {{comites ? comites.length : 0 }} comités    .
            </div>
        </ng-template>
    </p-table>
</div>
